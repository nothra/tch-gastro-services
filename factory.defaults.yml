# ─────────────────────────────────────────────────────────────────────────────
# factory.defaults.yml — kanonische Default-Konfiguration der Factory (ADR-009)
# ─────────────────────────────────────────────────────────────────────────────
#
# STATUS: Phase 1a von Issue #25. Diese Datei BÜNDELT die heute in
# scripts/run-pipeline.sh hartkodierten Werte (get_model/get_max_turns) an EINER
# Stelle — als Single Source of Truth + Lehr-Artefakt. In dieser Phase LIEST sie
# noch niemand (Verhalten unverändert); das Umstellen von run-pipeline.sh auf
# diese Datei (via yq) ist der nächste Schritt, sobald ADR-009 final ist.
#
# Schichtung (ADR-009 #1): Teams überschreiben einzelne Werte in einer eigenen
# factory.config.yml; defaults + override → effektive Config. Diese Datei NIE im
# adoptierten Projekt direkt editieren — sie kommt per Template-Update.
#
# Begründungs-Konvention (ADR-011): Jeder Knopf trägt seine Begründung als
# strukturierten Kommentar am Knopf — Tag @reason (warum es den Knopf/Default
# gibt) und Tag @tradeoff (was man beim Ändern aufgibt). Dimensions-Ebene =
# eigenständige `#`-Zeilen über dem Schlüssel; Wert-Ebene = Trailing-Kommentar
# auf der Knopf-Zeile. Dies ist die EINZIGE Heimat dieser Texte — die Wizards
# (/setup-project, /configure-factory), factory.config.yml.example und etwaige
# Inline-Kommentare VERWEISEN hierauf, statt zu kopieren (Anti-Drift, Spec #35
# Kriterium C). Env-Var-Hinweise (`# CLAUDE_MODEL_HEAVY`) und Abschnitts-Header
# tragen bewusst KEIN `@`-Tag und sind damit klar von der Quelle getrennt.
#
# schemaVersion: erlaubt späteres Validieren von Overrides gegen bekannte Keys.
schemaVersion: 1

# Modell-Tiers: WELCHE Modelle hinter "heavy"/"light" stehen. Die konkreten IDs
# bleiben über Env-Vars überschreibbar (Kosten-Hebel), Default wie heute:
#   heavy → schweres Reasoning (Implementieren, Reviewen, Security)
#   light → der Rest
# (Globaler Override CLAUDE_MODEL sticht weiterhin alles, siehe run-pipeline.sh.)
# @reason: Trennt schweres Reasoning (Implementieren/Reviewen/Security) vom Rest,
#   damit teure Modelle nur dort laufen, wo sie sich lohnen.
# @tradeoff: heavy senkt die Fehlerrate, kostet aber mehr pro Turn; light spart,
#   muss bei komplexem Reasoning aber ggf. nachfassen.
model_tiers:
  heavy: claude-opus-4-8      # CLAUDE_MODEL_HEAVY
  light: claude-sonnet-4-6    # CLAUDE_MODEL_LIGHT

# Pro Skill: Tier (→ Modell) + max_turns (Kosten-Deckel). Werte = heutiger
# Hardcode. Jeder Wert hat eine Begründung am Knopf — das ist der Sinn von YAML
# statt JSON (ADR-009 #2).
# @reason: tier wählt das Modell pro Skill, max_turns deckelt die Kosten je Lauf —
#   die zwei Knöpfe, die ein Team realistisch justiert.
# @tradeoff: höheres tier / mehr max_turns = mehr Spielraum und Qualität, aber
#   teurer pro Lauf; niedriger spart, kann aber Qualität kosten oder vorzeitig
#   abbrechen.
skills:
  implement:       { tier: heavy, max_turns: 20 }  # @reason: TDD-Zyklen, schreibt Code → schweres Reasoning lohnt heavy.
  review:          { tier: heavy, max_turns: 14 }  # @reason: Lese-Analyse über mehrere Personas; 8 riss bei mehrstufigen Reviews vor dem Verdict (Task 91).
  security-review: { tier: heavy, max_turns: 14 }  # @reason: OWASP-Prüfung vor Merge; 8 riss vor dem Verdict-Report (Task 91).
  bug-fix:         { tier: heavy, max_turns: 20 }  # @reason: wie implement: reproduzieren → fixen.
  test:            { tier: light, max_turns: 20 }  # @reason: Test-Suite vervollständigen, wenig schweres Reasoning.
  refactor:        { tier: light, max_turns: 20 }  # @reason: Clean-Code-Pass, kein neues Verhalten.
  codify:          { tier: light, max_turns: 8 }   # @reason: Learnings extrahieren.
  pr-shepherd:     { tier: light, max_turns: 8 }   # @reason: PR-Lifecycle-Orchestrierung.
  requirements:    { tier: light, max_turns: 6 }   # @reason: scoped, dokument-erzeugend.
  architecture:    { tier: light, max_turns: 6 }   # @reason: ADR-erzeugend.
  release-notes:   { tier: light, max_turns: 6 }   # @reason: Changelog aus letzten Features.

# Fallback für Skills ohne eigenen Eintrag (heute: get_*-default).
# @reason: Sicherer, günstiger Default für Skills ohne eigenen Eintrag.
default:
  tier: light
  max_turns: 10
