# Lokale DEV-Datenbank (Stage DEV) auf dem Entwicklungssystem.
# Voraussetzung: Docker Compose v2 (`docker compose`).
# Start:  pnpm db:up
# Stop:   pnpm db:down
# Passende DATABASE_URL in .env.local:
#   postgresql://tch:tch@localhost:5432/tch_dev
# Postgres-Major an INT/PRD (Neon = 18) angeglichen; -alpine = schlank.
services:
  db:
    image: postgres:18-alpine
    container_name: tch-gastro-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: tch
      POSTGRES_PASSWORD: tch
      POSTGRES_DB: tch_dev
    ports:
      - "5432:5432"
    # Postgres 18+ legt die Daten unter /var/lib/postgresql/<major> ab → Mount auf
    # /var/lib/postgresql (nicht mehr .../data), siehe docker-library/postgres#37.
    volumes:
      - tch-db-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tch -d tch_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  tch-db-data:
