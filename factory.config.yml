# ─────────────────────────────────────────────────────────────────────────────
# factory.config.yml — Team-Override für TCH Gastro Services (ADR-009)
# ─────────────────────────────────────────────────────────────────────────────
#
# Begründung/Trade-off der Knöpfe: siehe factory.defaults.yml → skills.<name>
# (Tags @reason/@tradeoff, ADR-011). Diese Datei zitiert nicht, sie überschreibt nur.
#
# ── Knopf: skills.implement / skills.pr-shepherd (max_turns) ─────────────────
# Learning aus Task 49 (Getränke-Katalog-Preise, 2026-07-14): Mit den Default-
# Turn-Deckeln ist die Stage-3-Pipeline zweimal bei /implement (Default 20) und
# einmal bei /pr-shepherd (Default 8) mit "Reached max turns" abgebrochen, ohne
# ein Ergebnis zu liefern. Mit MAX_TURNS=40 bzw. 20 (manueller Retry) sind beide
# Skills durchgelaufen. Werte hier auf die validierten Werte angehoben.
#
# ── Knopf: skills.codify (max_turns) ──────────────────────────────────────────
# Learning aus Task 50 (Teilnehmer-Stammdaten, 2026-07-14): Mit dem Default
# (8) ist /codify zweimal mit "Reached max turns" abgebrochen, ohne einen
# Report zu schreiben. Mit MAX_TURNS=16 (manueller Retry) lief der Skill beim
# ersten Versuch durch. Wert hier auf den validierten Wert angehoben.
#
# ── Knopf: skills.test (max_turns) ────────────────────────────────────────────
# Learning aus Task 52 (Verzehr erfassen, 2026-07-17): Mit dem Default (20) ist
# /test dreimal mit "Reached max turns" abgebrochen, ohne einen Report zu
# schreiben. Ursache war kein echter Coverage-Rückstand, sondern ein Text-
# Reporter-Artefakt von @vitest/coverage-v8: Dateien unter einem Unterstrich-
# präfigierten Verzeichnis (hier `app/_verzehr/`) fehlen als Zeile in der
# gedruckten Tabelle, obwohl sie in der aggregierten Summe korrekt mitgezählt
# werden (manuell verifiziert: `vitest run app/_verzehr/summen.test.ts
# --coverage` meldet 100% in der Summary, aber keine Zeile in der Tabelle).
# Der Skill lief wiederholt in diese scheinbare Lücke hinein. Wert hier auf
# einen validierten höheren Deckel angehoben, um Spielraum zum Erkennen
# "kein echter Rückstand" zu geben.
#
# ── Knopf: model_tiers.light (Modell-ID-Pflege) ──────────────────────────────
# model_tiers.light von "claude-sonnet-4-6" (veraltete Modell-ID) auf
# "claude-sonnet-5" (aktuelle Sonnet-Generation) aktualisiert.
#
# ── Knopf: skills.implement (Tier-Frage GEKLÄRT, #197 / ADR-038) ─────────────
# Die früher hier offene implement-Tier-Frage (Task 135: Sonnet 5 reichte für
# einen kleinen Fix; Task 53: Sonnet 5 riss 3x bei größerem Scope) ist jetzt
# ENTSCHIEDEN – nicht mehr pauschal pro Skill, sondern GRÖSSENABHÄNGIG
# (factory.defaults.yml → skills.implement.tier_by_size, ADR-038): kleiner Lauf
# (Proxy < Schwelle) → light, großer → heavy; statisches tier: heavy bleibt als
# Fail-Safe. Der frühere provisorische `implement: { tier: heavy }`-Override ist
# damit aufgelöst (AK12) – hier steht nur noch der bewusste max_turns-Deckel.
# @reason (max_turns=50): großer implement-Lauf braucht Spielraum; 50 ist das
#   Gate-Policy-Maximum (ADR-009 §6, MAX_TURNS_CEILING; ein Versuch mit 80 wurde
#   vom config-validation-check hart abgelehnt).
model_tiers:
  light: claude-sonnet-5
skills:
  implement: { max_turns: 50 }
  pr-shepherd: { max_turns: 20 }
  codify: { max_turns: 16 }
  test: { max_turns: 40 }
