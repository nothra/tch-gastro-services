# Deploy-Gate: Production wird erst deployt, wenn die E2E-Oberflächentests auf INT grün sind.
#
# Fluss:  Push auf main  →  INT auf diesen Commit bringen  →  INT-DB von PRD auffrischen
#         (Reset → anonymisieren → migrieren → Admin seeden)  →  auf INT-Build warten
#         →  Playwright-E2E gegen INT  →  (nur bei Grün) PRD-DB migrieren + seeden
#         →  Promote main → production  →  Vercel deployt Production  →  auf PRD-Build warten
#         →  /api/health-Check (DB-Read). Prod-Migration automatisiert (ADR-017), abgesichert
#         durch das INT-Gate (Migration gegen prod-nahe, anonymisierte Daten) + E2E.
#
# Pflicht-Secrets (Gate): VERCEL_AUTOMATION_BYPASS_SECRET, E2E_ADMIN_EMAIL, E2E_ADMIN_PASSWORD,
#   PRD_DATABASE_URL, PRD_ADMIN_EMAIL, PRD_ADMIN_PASSWORD (Prod-Migration = fail-closed, ADR-017).
# Optional (INT-Refresh, ADR-015): NEON_API_KEY, NEON_PROJECT_ID, NEON_INT_BRANCH_ID,
#   NEON_PRD_BRANCH_ID, INT_DATABASE_URL. Fehlt eines davon, wird der Refresh mit Warnung
#   ÜBERSPRUNGEN (kein Reset = keine neue PII) – das Gate läuft trotzdem.
# Aktivierung: siehe README (erst Gate grün, dann Vercel Production Branch auf `production` umstellen).

name: Deploy Gate (E2E → Production)

on:
  push:
    branches: [main]

concurrency:
  group: deploy-gate
  cancel-in-progress: false

permissions:
  contents: write
  # issues: write für die aktive Freeze-Benachrichtigung (Tracking-Issue, ADR-032 §5,
  # fail-open). Der fail-closed Marker (refs/factory/deploy-freeze) nutzt contents: write.
  issues: write

jobs:
  gate:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      REPO: ${{ github.repository }}
      SHA: ${{ github.sha }}
      INT_URL: https://tch-gastro-services-git-int-tch-developers.vercel.app
      PRD_URL: https://tch-gastro-services.vercel.app
      BYPASS: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
    steps:
      - uses: actions/checkout@v4
        # fetch-depth: 0 = voller Verlauf. Nötig für den Promote-Push nach `production`:
        # ein Shallow-Clone (Default depth 1) kann den Fast-Forward nicht belegen und wird
        # serverseitig als non-fast-forward abgelehnt (der erste Lauf ging nur durch, weil er
        # `production` neu anlegte). INT-Sync nutzt --force und ist davon unabhängig.
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Secrets vorhanden?
        # Secrets über env: als Shell-Variablen lesen und nur gequotet testen (wie $BYPASS).
        # GitHub ersetzt ${{ … }} textuell VOR der Shell → inline im run: könnte ein Wert mit
        # "/Backtick aus dem Test-Ausdruck ausbrechen (Actions-Script-Injection). #66 schließt das.
        env:
          E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
          E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
          PRD_DATABASE_URL: ${{ secrets.PRD_DATABASE_URL }}
          PRD_ADMIN_EMAIL: ${{ secrets.PRD_ADMIN_EMAIL }}
          PRD_ADMIN_PASSWORD: ${{ secrets.PRD_ADMIN_PASSWORD }}
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}
          NEON_INT_BRANCH_ID: ${{ secrets.NEON_INT_BRANCH_ID }}
          NEON_PRD_BRANCH_ID: ${{ secrets.NEON_PRD_BRANCH_ID }}
          INT_DATABASE_URL: ${{ secrets.INT_DATABASE_URL }}
        run: |
          missing=0
          [ -n "$BYPASS" ] || { echo "::error::VERCEL_AUTOMATION_BYPASS_SECRET fehlt"; missing=1; }
          [ -n "$E2E_ADMIN_EMAIL" ] || { echo "::error::E2E_ADMIN_EMAIL fehlt"; missing=1; }
          [ -n "$E2E_ADMIN_PASSWORD" ] || { echo "::error::E2E_ADMIN_PASSWORD fehlt"; missing=1; }
          # PRD-Migration ist Pflicht (ADR-017): kein stilles Überspringen – fehlt ein Secret, bricht das Gate ab.
          [ -n "$PRD_DATABASE_URL" ] || { echo "::error::PRD_DATABASE_URL fehlt"; missing=1; }
          [ -n "$PRD_ADMIN_EMAIL" ] || { echo "::error::PRD_ADMIN_EMAIL fehlt"; missing=1; }
          [ -n "$PRD_ADMIN_PASSWORD" ] || { echo "::error::PRD_ADMIN_PASSWORD fehlt"; missing=1; }
          # Der INT-Refresh (ADR-015) ist die Absicherungs-Vorstufe der PRD-Auto-Migration (ADR-017):
          # er migriert INT gegen prod-nahe, anonymisierte Daten, bevor PRD migriert wird. Solange das
          # Gate PRD automatisch migriert, sind diese Secrets daher PFLICHT (sonst liefe PRD-Migration
          # ohne den bewiesenen INT-Lauf – genau die stille Lücke, die ADR-017 schließt).
          [ -n "$NEON_API_KEY" ] || { echo "::error::NEON_API_KEY fehlt (INT-Refresh = Absicherung der PRD-Migration)"; missing=1; }
          [ -n "$NEON_PROJECT_ID" ] || { echo "::error::NEON_PROJECT_ID fehlt"; missing=1; }
          [ -n "$NEON_INT_BRANCH_ID" ] || { echo "::error::NEON_INT_BRANCH_ID fehlt"; missing=1; }
          [ -n "$NEON_PRD_BRANCH_ID" ] || { echo "::error::NEON_PRD_BRANCH_ID fehlt"; missing=1; }
          [ -n "$INT_DATABASE_URL" ] || { echo "::error::INT_DATABASE_URL fehlt"; missing=1; }
          [ "$missing" = 0 ] || exit 1

      - name: Abhängigkeiten
        run: pnpm install --frozen-lockfile
      - name: Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: INT auf diesen Commit bringen
        run: git push origin "HEAD:int" --force

      - name: INT-Refresh aktiv? (Neon-Secrets vorhanden)
        id: refresh
        # Secrets über env: lesen und nur gequotet testen (Härtung #66, wie oben).
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}
          NEON_INT_BRANCH_ID: ${{ secrets.NEON_INT_BRANCH_ID }}
          NEON_PRD_BRANCH_ID: ${{ secrets.NEON_PRD_BRANCH_ID }}
          INT_DATABASE_URL: ${{ secrets.INT_DATABASE_URL }}
        run: |
          if [ -n "$NEON_API_KEY" ] \
             && [ -n "$NEON_PROJECT_ID" ] \
             && [ -n "$NEON_INT_BRANCH_ID" ] \
             && [ -n "$NEON_PRD_BRANCH_ID" ] \
             && [ -n "$INT_DATABASE_URL" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "INT-Refresh aktiv (alle Neon-Secrets + INT_DATABASE_URL vorhanden)."
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning::INT-Refresh übersprungen – Neon-Secrets/INT_DATABASE_URL fehlen. INT-DB wird NICHT von PRD aufgefrischt/anonymisiert."
          fi

      # ACHTUNG (ADR-015): Reset holt ECHTE Prod-Daten auf INT → unmittelbar danach
      # anonymisieren. Beide Schritte laufen fail-closed; schlägt einer fehl, bricht das
      # Gate ab (kein Promote). Reihenfolge: Reset → anonymisieren → migrieren → seed.
      - name: INT-DB von PRD zurücksetzen (Neon Reset from parent)
        if: steps.refresh.outputs.enabled == 'true'
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}
          NEON_INT_BRANCH_ID: ${{ secrets.NEON_INT_BRANCH_ID }}
          NEON_PRD_BRANCH_ID: ${{ secrets.NEON_PRD_BRANCH_ID }}
        run: bash scripts/neon-reset-int.sh

      # Der Sammelschritt ist in drei Steps aufgeteilt (ADR-032 §4): nur die Migration
      # (db:migrate:int) ist ein Freeze-Trigger; Anonymisierung + Seed bleiben Infra/Safety.
      # .env.int wird EINMAL angelegt (nur hier stehen die Secrets) und am Ende per always()-Step
      # wieder entfernt – so überlebt es die drei Steps, ohne die Credentials mehrfach zu schreiben.
      - name: INT anonymisieren (.env.int anlegen)
        if: steps.refresh.outputs.enabled == 'true'
        env:
          NEXT_PUBLIC_STAGE: int
          DATABASE_URL: ${{ secrets.INT_DATABASE_URL }}
          SEED_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
          SEED_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
        run: |
          # Die db:*:int-Scripts lesen via `dotenv -e .env.int`; %s nimmt Werte literal → sicher.
          # (.env.int ist gitignored; Runner ist ephemer; Aufräumen im always()-Step unten.)
          printf 'NEXT_PUBLIC_STAGE=%s\nDATABASE_URL=%s\nSEED_ADMIN_EMAIL=%s\nSEED_ADMIN_PASSWORD=%s\n' \
            "$NEXT_PUBLIC_STAGE" "$DATABASE_URL" "$SEED_ADMIN_EMAIL" "$SEED_ADMIN_PASSWORD" > .env.int
          pnpm db:anonymize:int   # zuerst: reale PII sofort überschreiben (Guard: STAGE=int)

      - name: INT migrieren
        id: migrate_int
        if: steps.refresh.outputs.enabled == 'true'
        # Freeze-Trigger (ADR-032): schlägt die Schema-Migration fehl, wird die Produktion
        # eingefroren. Liest die zuvor angelegte .env.int (dotenv), kein eigener env-Block nötig.
        run: pnpm db:migrate:int     # ausstehende Migrationen auf INT anwenden/testen (vor PRD)

      - name: INT-Admin seeden
        if: steps.refresh.outputs.enabled == 'true'
        run: pnpm db:seed:int        # bekannten INT-Admin (= E2E-Login) sicherstellen

      - name: INT-Env aufräumen (.env.int)
        if: always()
        run: rm -f .env.int          # Credentials nicht über den Lauf hinaus liegen lassen

      - name: Auf INT-Deployment dieses Commits warten
        run: |
          echo "Warte, bis INT den Commit $SHA ausliefert …"
          for i in $(seq 1 60); do
            got=$(curl -sf -H "x-vercel-protection-bypass: $BYPASS" "$INT_URL/api/version" \
                  | jq -r '.sha // ""' 2>/dev/null || true)
            echo "  Versuch $i: INT sha=${got:-<leer>}"
            [ "$got" = "$SHA" ] && { echo "INT ist auf $SHA."; exit 0; }
            sleep 12
          done
          echo "::error::Timeout – INT liefert nach ~12 min nicht Commit $SHA aus"; exit 1

      - name: E2E gegen INT
        id: e2e   # Freeze-Trigger (ADR-032): flaky-/echt-rote E2E friert die Produktion ein.
        env:
          NEXT_PUBLIC_STAGE: int
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
          SEED_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
          SEED_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
        run: pnpm exec playwright test

      - name: Playwright-Report bei Fehler sichern
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      # Deploy-Freeze prüfen – VOR der effektbehafteten PRD-Migration (ADR-032 §3, AC4).
      # Fail-closed: nur ein eindeutiges „nicht eingefroren" (Exit 10) lässt den Promote-Pfad
      # zu; „eingefroren" (0) UND „unklar/unlesbar" (jeder andere Exit) setzen frozen=true.
      # Der Step selbst endet grün (kein exit 1), damit ein legitim zurückgehaltener Lauf
      # nicht als neuer roter Gate-Lauf erscheint (AC5) und keinen Freeze auslöst.
      - name: Deploy-Freeze prüfen (fail-closed, vor PRD-Migration)
        id: check_freeze
        run: |
          set +e
          bash scripts/deploy-freeze.sh check
          rc=$?
          set -e
          if [ "$rc" -eq 10 ]; then
            echo "frozen=false" >> "$GITHUB_OUTPUT"
            echo "Kein Deploy-Freeze aktiv – Gate fährt mit PRD-Migration + Promote fort."
            exit 0
          fi
          # rc 0 = eingefroren, alles andere = unklar/unlesbar → in beiden Fällen fail-closed.
          echo "frozen=true" >> "$GITHUB_OUTPUT"
          sha=$(bash scripts/deploy-freeze.sh status 2>/dev/null || echo "unbekannt")
          reason="Deploy-Freeze aktiv (Freeze-Check-Exit ${rc}: 0=eingefroren, sonst=Marker unklar)."
          echo "::warning::${reason} Blockierender Commit: ${sha}. Promote wird zurückgehalten (Lauf bleibt grün, AC5)."
          {
            echo "### 🚫 Deploy-Freeze aktiv – Promote zurückgehalten"
            echo ""
            echo "Blockierender Commit: \`${sha}\`"
            echo "Freeze-Check-Exit: ${rc} (10 = frei, 0 = eingefroren, sonst = Marker unklar/fail-closed)"
            echo ""
            echo "PRD-Migration + Promote + Healthcheck wurden übersprungen. Nach Fix + Verifikation"
            echo "über den Workflow **Deploy-Freeze aufheben (Freigabe)** (Actions → Run workflow) freigeben."
          } >> "$GITHUB_STEP_SUMMARY"
          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          bash scripts/deploy-freeze-notify.sh blocked "$sha" "$reason" "$run_url" || true

      # PRD-DB migrieren + Login seeden – ERST nach grünem INT-E2E (ADR-017) und nur, wenn KEIN
      # Deploy-Freeze aktiv ist (ADR-032, AC3/AC4). Das INT-Gate hat dieselbe Migration gegen
      # prod-nahe, anonymisierte Daten bewiesen. Fail-closed: schlägt Migration/Seed fehl, bricht
      # das Gate ab → KEIN Promote (Prod-Code bleibt konsistent zum alten Schema).
      - name: PRD-DB migrieren + Login seeden
        id: migrate_prd
        if: steps.check_freeze.outputs.frozen != 'true'
        env:
          NEXT_PUBLIC_STAGE: prd
          DATABASE_URL: ${{ secrets.PRD_DATABASE_URL }}
          SEED_ADMIN_EMAIL: ${{ secrets.PRD_ADMIN_EMAIL }}
          SEED_ADMIN_PASSWORD: ${{ secrets.PRD_ADMIN_PASSWORD }}
        run: |
          # .env.prd enthält Prod-DB-URL + Admin-Passwort → per trap auch bei Fehler löschen
          # (nicht nur am Happy-Path). Runner ist ephemer, aber fail-safe ist billiger als sorry.
          trap 'rm -f .env.prd' EXIT
          # db:*:prd lesen via `dotenv -e .env.prd`; Datei aus Secrets erzeugen (gitignored).
          # %s nimmt Werte literal → sicher.
          printf 'NEXT_PUBLIC_STAGE=%s\nDATABASE_URL=%s\nSEED_ADMIN_EMAIL=%s\nSEED_ADMIN_PASSWORD=%s\n' \
            "$NEXT_PUBLIC_STAGE" "$DATABASE_URL" "$SEED_ADMIN_EMAIL" "$SEED_ADMIN_PASSWORD" > .env.prd
          pnpm db:migrate:prd     # auf INT bereits bewiesene Migration(en) auf PRD anwenden
          pnpm db:seed:prd        # Prod-Login idempotent sicherstellen

      - name: Promote main → production (nur bei grünem E2E + PRD-Migration, kein Freeze)
        if: steps.check_freeze.outputs.frozen != 'true'
        run: |
          echo "E2E grün + PRD migriert + kein Freeze → Promote $SHA nach production"
          git push origin "HEAD:production"

      # CI-grün ≠ Prod-grün (ADR-007): das tatsächlich deployte Prod verifizieren – neuer Code
      # UND migrierte DB. Erst auf den Prod-Build dieses Commits warten, dann /api/health
      # (DB-Read auf die roles-Spalte). Prod ist öffentlich → kein Bypass-Header nötig.
      - name: Auf PRD-Deployment warten + Healthcheck
        if: steps.check_freeze.outputs.frozen != 'true'
        run: |
          echo "Warte, bis PRD den Commit $SHA ausliefert …"
          ok=0
          for i in $(seq 1 60); do
            got=$(curl -sf "$PRD_URL/api/version" | jq -r '.sha // ""' 2>/dev/null || true)
            echo "  Versuch $i: PRD sha=${got:-<leer>}"
            [ "$got" = "$SHA" ] && { ok=1; break; }
            sleep 12
          done
          [ "$ok" = 1 ] || { echo "::error::Timeout – PRD liefert nach ~12 min nicht Commit $SHA aus"; exit 1; }
          echo "PRD ist auf $SHA – Healthcheck $PRD_URL/api/health (DB-Read) …"
          # `|| true` + Fallback 000: curl-Hard-Fail (Timeout, exit 28) würde sonst den Step vor
          # der Diagnose-Meldung abbrechen. So bleibt der Fehlschlag sichtbar UND fail-closed.
          code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 15 "$PRD_URL/api/health" || true)
          [ "${code:-000}" = "200" ] || { echo "::error::PRD-Healthcheck fehlgeschlagen (HTTP ${code:-000}) – DB/Schema prüfen"; exit 1; }
          echo "PRD-Healthcheck OK (200)."

      # Deploy-Freeze SETZEN – scharf eingegrenzt (ADR-032 §4, AC1/AC2). Läuft nur, wenn der Job
      # fehlschlägt UND der Fehlschlag aus einem verifikations-/migrationsrelevanten Step stammt
      # (E2E gegen INT, db:migrate:int, db:migrate:prd). Da ein fehlschlagender Step den Job
      # abbricht, hat höchstens einer dieser outcomes den Wert 'failure'; ein vorher gescheiterter
      # reiner Infra-Step (Secret-Check, Install, INT-Deploy-Timeout, Neon-Reset, Anonymisierung)
      # lässt alle drei leer/'skipped' → KEIN Freeze (AC2).
      - name: Deploy-Freeze setzen (nur bei verifikationsrelevantem Fehlschlag)
        id: set_freeze
        if: >-
          failure() && (
            steps.e2e.outcome == 'failure'
            || steps.migrate_int.outcome == 'failure'
            || steps.migrate_prd.outcome == 'failure'
          )
        run: |
          # outcome-Werte sind von GitHub kontrolliert (success/failure/…), kein User-Input → inline sicher.
          if [ "${{ steps.e2e.outcome }}" = "failure" ]; then reason="E2E gegen INT rot"; fi
          if [ "${{ steps.migrate_int.outcome }}" = "failure" ]; then reason="db:migrate:int rot"; fi
          if [ "${{ steps.migrate_prd.outcome }}" = "failure" ]; then reason="db:migrate:prd rot"; fi
          echo "::warning::Verifikationsrelevanter Fehlschlag (${reason}) → Deploy-Freeze wird gesetzt (blockiert Promote bis zur Freigabe)."
          # Fail-closed: schlägt der Ref-Push fehl, endet dieser Step non-zero (sichtbar). Ein
          # bestehender Freeze wird nicht überschrieben (deploy-freeze.sh set, ADR-032).
          bash scripts/deploy-freeze.sh set "$SHA" "$reason"
          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          # Benachrichtigung ist fail-open – darf den Marker nie blockieren.
          bash scripts/deploy-freeze-notify.sh frozen "$SHA" "$reason" "$run_url" || true
          {
            echo "### 🚫 Deploy-Freeze gesetzt"
            echo ""
            echo "Blockierender Commit: \`${SHA}\`"
            echo "Grund: ${reason}"
            echo ""
            echo "Der Promote (inkl. PRD-DB-Migration) ist bis zur Freigabe angehalten."
          } >> "$GITHUB_STEP_SUMMARY"
