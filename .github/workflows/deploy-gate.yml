# Deploy-Gate: Production wird erst deployt, wenn die E2E-Oberflächentests auf INT grün sind.
#
# Fluss:  Push auf main  →  INT auf diesen Commit bringen  →  INT-DB von PRD auffrischen
#         (Reset → anonymisieren → migrieren → Admin seeden)  →  auf INT-Build warten
#         →  Playwright-E2E gegen INT  →  (nur bei Grün) PRD-DB migrieren + seeden
#         →  Promote main → production  →  Vercel deployt Production  →  auf PRD-Build warten
#         →  /api/health-Check (DB-Read). Prod-Migration automatisiert (ADR-017), abgesichert
#         durch das INT-Gate (Migration gegen prod-nahe, anonymisierte Daten) + E2E.
#
# Pflicht-Secrets (Gate): VERCEL_AUTOMATION_BYPASS_SECRET, E2E_ADMIN_EMAIL, E2E_ADMIN_PASSWORD,
#   PRD_DATABASE_URL, PRD_ADMIN_EMAIL, PRD_ADMIN_PASSWORD (Prod-Migration = fail-closed, ADR-017).
# Optional (INT-Refresh, ADR-015): NEON_API_KEY, NEON_PROJECT_ID, NEON_INT_BRANCH_ID,
#   NEON_PRD_BRANCH_ID, INT_DATABASE_URL. Fehlt eines davon, wird der Refresh mit Warnung
#   ÜBERSPRUNGEN (kein Reset = keine neue PII) – das Gate läuft trotzdem.
# Aktivierung: siehe README (erst Gate grün, dann Vercel Production Branch auf `production` umstellen).

name: Deploy Gate (E2E → Production)

on:
  push:
    branches: [main]

concurrency:
  group: deploy-gate
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  gate:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      REPO: ${{ github.repository }}
      SHA: ${{ github.sha }}
      INT_URL: https://tch-gastro-services-git-int-tch-developers.vercel.app
      PRD_URL: https://tch-gastro-services.vercel.app
      BYPASS: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
    steps:
      - uses: actions/checkout@v4
        # fetch-depth: 0 = voller Verlauf. Nötig für den Promote-Push nach `production`:
        # ein Shallow-Clone (Default depth 1) kann den Fast-Forward nicht belegen und wird
        # serverseitig als non-fast-forward abgelehnt (der erste Lauf ging nur durch, weil er
        # `production` neu anlegte). INT-Sync nutzt --force und ist davon unabhängig.
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Secrets vorhanden?
        run: |
          missing=0
          [ -n "$BYPASS" ] || { echo "::error::VERCEL_AUTOMATION_BYPASS_SECRET fehlt"; missing=1; }
          [ -n "${{ secrets.E2E_ADMIN_EMAIL }}" ] || { echo "::error::E2E_ADMIN_EMAIL fehlt"; missing=1; }
          [ -n "${{ secrets.E2E_ADMIN_PASSWORD }}" ] || { echo "::error::E2E_ADMIN_PASSWORD fehlt"; missing=1; }
          # PRD-Migration ist Pflicht (ADR-017): kein stilles Überspringen – fehlt ein Secret, bricht das Gate ab.
          [ -n "${{ secrets.PRD_DATABASE_URL }}" ] || { echo "::error::PRD_DATABASE_URL fehlt"; missing=1; }
          [ -n "${{ secrets.PRD_ADMIN_EMAIL }}" ] || { echo "::error::PRD_ADMIN_EMAIL fehlt"; missing=1; }
          [ -n "${{ secrets.PRD_ADMIN_PASSWORD }}" ] || { echo "::error::PRD_ADMIN_PASSWORD fehlt"; missing=1; }
          # Der INT-Refresh (ADR-015) ist die Absicherungs-Vorstufe der PRD-Auto-Migration (ADR-017):
          # er migriert INT gegen prod-nahe, anonymisierte Daten, bevor PRD migriert wird. Solange das
          # Gate PRD automatisch migriert, sind diese Secrets daher PFLICHT (sonst liefe PRD-Migration
          # ohne den bewiesenen INT-Lauf – genau die stille Lücke, die ADR-017 schließt).
          [ -n "${{ secrets.NEON_API_KEY }}" ] || { echo "::error::NEON_API_KEY fehlt (INT-Refresh = Absicherung der PRD-Migration)"; missing=1; }
          [ -n "${{ secrets.NEON_PROJECT_ID }}" ] || { echo "::error::NEON_PROJECT_ID fehlt"; missing=1; }
          [ -n "${{ secrets.NEON_INT_BRANCH_ID }}" ] || { echo "::error::NEON_INT_BRANCH_ID fehlt"; missing=1; }
          [ -n "${{ secrets.NEON_PRD_BRANCH_ID }}" ] || { echo "::error::NEON_PRD_BRANCH_ID fehlt"; missing=1; }
          [ -n "${{ secrets.INT_DATABASE_URL }}" ] || { echo "::error::INT_DATABASE_URL fehlt"; missing=1; }
          [ "$missing" = 0 ] || exit 1

      - name: Abhängigkeiten
        run: pnpm install --frozen-lockfile
      - name: Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: INT auf diesen Commit bringen
        run: git push origin "HEAD:int" --force

      - name: INT-Refresh aktiv? (Neon-Secrets vorhanden)
        id: refresh
        run: |
          if [ -n "${{ secrets.NEON_API_KEY }}" ] \
             && [ -n "${{ secrets.NEON_PROJECT_ID }}" ] \
             && [ -n "${{ secrets.NEON_INT_BRANCH_ID }}" ] \
             && [ -n "${{ secrets.NEON_PRD_BRANCH_ID }}" ] \
             && [ -n "${{ secrets.INT_DATABASE_URL }}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "INT-Refresh aktiv (alle Neon-Secrets + INT_DATABASE_URL vorhanden)."
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning::INT-Refresh übersprungen – Neon-Secrets/INT_DATABASE_URL fehlen. INT-DB wird NICHT von PRD aufgefrischt/anonymisiert."
          fi

      # ACHTUNG (ADR-015): Reset holt ECHTE Prod-Daten auf INT → unmittelbar danach
      # anonymisieren. Beide Schritte laufen fail-closed; schlägt einer fehl, bricht das
      # Gate ab (kein Promote). Reihenfolge: Reset → anonymisieren → migrieren → seed.
      - name: INT-DB von PRD zurücksetzen (Neon Reset from parent)
        if: steps.refresh.outputs.enabled == 'true'
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}
          NEON_INT_BRANCH_ID: ${{ secrets.NEON_INT_BRANCH_ID }}
          NEON_PRD_BRANCH_ID: ${{ secrets.NEON_PRD_BRANCH_ID }}
        run: bash scripts/neon-reset-int.sh

      - name: INT anonymisieren, migrieren, Admin seeden
        if: steps.refresh.outputs.enabled == 'true'
        env:
          NEXT_PUBLIC_STAGE: int
          DATABASE_URL: ${{ secrets.INT_DATABASE_URL }}
          SEED_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
          SEED_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
        run: |
          # Die db:*:int-Scripts lesen via `dotenv -e .env.int`; Datei aus Secrets erzeugen.
          # (.env.int ist gitignored; Runner ist ephemer.) %s nimmt Werte literal → sicher.
          printf 'NEXT_PUBLIC_STAGE=%s\nDATABASE_URL=%s\nSEED_ADMIN_EMAIL=%s\nSEED_ADMIN_PASSWORD=%s\n' \
            "$NEXT_PUBLIC_STAGE" "$DATABASE_URL" "$SEED_ADMIN_EMAIL" "$SEED_ADMIN_PASSWORD" > .env.int
          pnpm db:anonymize:int   # zuerst: reale PII sofort überschreiben (Guard: STAGE=int)
          pnpm db:migrate:int     # ausstehende Migrationen auf INT anwenden/testen (vor PRD)
          pnpm db:seed:int        # bekannten INT-Admin (= E2E-Login) sicherstellen
          rm -f .env.int

      - name: Auf INT-Deployment dieses Commits warten
        run: |
          echo "Warte, bis INT den Commit $SHA ausliefert …"
          for i in $(seq 1 60); do
            got=$(curl -sf -H "x-vercel-protection-bypass: $BYPASS" "$INT_URL/api/version" \
                  | jq -r '.sha // ""' 2>/dev/null || true)
            echo "  Versuch $i: INT sha=${got:-<leer>}"
            [ "$got" = "$SHA" ] && { echo "INT ist auf $SHA."; exit 0; }
            sleep 12
          done
          echo "::error::Timeout – INT liefert nach ~12 min nicht Commit $SHA aus"; exit 1

      - name: E2E gegen INT
        env:
          NEXT_PUBLIC_STAGE: int
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
          SEED_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
          SEED_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
        run: pnpm exec playwright test

      - name: Playwright-Report bei Fehler sichern
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      # PRD-DB migrieren + Login seeden – ERST nach grünem INT-E2E (ADR-017). Das INT-Gate
      # hat dieselbe Migration gegen prod-nahe, anonymisierte Daten bewiesen. Fail-closed:
      # schlägt Migration/Seed fehl, bricht das Gate ab → KEIN Promote (Prod-Code bleibt
      # konsistent zum alten Schema). Reihenfolge bewusst VOR dem Promote.
      - name: PRD-DB migrieren + Login seeden
        env:
          NEXT_PUBLIC_STAGE: prd
          DATABASE_URL: ${{ secrets.PRD_DATABASE_URL }}
          SEED_ADMIN_EMAIL: ${{ secrets.PRD_ADMIN_EMAIL }}
          SEED_ADMIN_PASSWORD: ${{ secrets.PRD_ADMIN_PASSWORD }}
        run: |
          # .env.prd enthält Prod-DB-URL + Admin-Passwort → per trap auch bei Fehler löschen
          # (nicht nur am Happy-Path). Runner ist ephemer, aber fail-safe ist billiger als sorry.
          trap 'rm -f .env.prd' EXIT
          # db:*:prd lesen via `dotenv -e .env.prd`; Datei aus Secrets erzeugen (gitignored).
          # %s nimmt Werte literal → sicher.
          printf 'NEXT_PUBLIC_STAGE=%s\nDATABASE_URL=%s\nSEED_ADMIN_EMAIL=%s\nSEED_ADMIN_PASSWORD=%s\n' \
            "$NEXT_PUBLIC_STAGE" "$DATABASE_URL" "$SEED_ADMIN_EMAIL" "$SEED_ADMIN_PASSWORD" > .env.prd
          pnpm db:migrate:prd     # auf INT bereits bewiesene Migration(en) auf PRD anwenden
          pnpm db:seed:prd        # Prod-Login idempotent sicherstellen

      - name: Promote main → production (nur bei grünem E2E + PRD-Migration)
        run: |
          echo "E2E grün + PRD migriert → Promote $SHA nach production"
          git push origin "HEAD:production"

      # CI-grün ≠ Prod-grün (ADR-007): das tatsächlich deployte Prod verifizieren – neuer Code
      # UND migrierte DB. Erst auf den Prod-Build dieses Commits warten, dann /api/health
      # (DB-Read auf die roles-Spalte). Prod ist öffentlich → kein Bypass-Header nötig.
      - name: Auf PRD-Deployment warten + Healthcheck
        run: |
          echo "Warte, bis PRD den Commit $SHA ausliefert …"
          ok=0
          for i in $(seq 1 60); do
            got=$(curl -sf "$PRD_URL/api/version" | jq -r '.sha // ""' 2>/dev/null || true)
            echo "  Versuch $i: PRD sha=${got:-<leer>}"
            [ "$got" = "$SHA" ] && { ok=1; break; }
            sleep 12
          done
          [ "$ok" = 1 ] || { echo "::error::Timeout – PRD liefert nach ~12 min nicht Commit $SHA aus"; exit 1; }
          echo "PRD ist auf $SHA – Healthcheck $PRD_URL/api/health (DB-Read) …"
          # `|| true` + Fallback 000: curl-Hard-Fail (Timeout, exit 28) würde sonst den Step vor
          # der Diagnose-Meldung abbrechen. So bleibt der Fehlschlag sichtbar UND fail-closed.
          code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 15 "$PRD_URL/api/health" || true)
          [ "${code:-000}" = "200" ] || { echo "::error::PRD-Healthcheck fehlgeschlagen (HTTP ${code:-000}) – DB/Schema prüfen"; exit 1; }
          echo "PRD-Healthcheck OK (200)."
